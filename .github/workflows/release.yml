name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.22"
  NODE_VERSION: "20"

jobs:
  build-go-binaries:
    name: Go Binaries (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go services
        working-directory: services
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p ../dist
          VERSION="${{ github.ref_name }}"
          for svc in gateway scheduler health defense research optimizer tenancy fleet; do
            echo "Building ${svc}..."
            go build -ldflags="-s -w -X main.version=${VERSION}" \
              -o "../dist/irongolem-${svc}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" \
              "./${svc}/cmd"
          done
          ls -la ../dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 5

  build-rust-libs:
    name: Rust Libs (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            label: linux-amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            label: linux-arm64
          - target: x86_64-apple-darwin
            runner: macos-latest
            label: darwin-amd64
          - target: aarch64-apple-darwin
            runner: macos-latest
            label: darwin-arm64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            label: windows-amd64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build Rust crates
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Rust libraries
        shell: bash
        run: |
          mkdir -p dist
          # Package all .rlib and .so/.dylib/.dll library files
          find target/${{ matrix.target }}/release -maxdepth 1 \
            \( -name "*.rlib" -o -name "*.so" -o -name "*.dylib" -o -name "*.dll" -o -name "*.a" \) \
            -exec cp {} dist/ \;
          # Create a tarball of the libraries
          tar -czf "irongolem-runtime-${{ matrix.label }}.tar.gz" -C dist .
          ls -la irongolem-runtime-${{ matrix.label }}.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: rust-${{ matrix.label }}
          path: irongolem-runtime-${{ matrix.label }}.tar.gz
          retention-days: 5

  build-web:
    name: Web Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build all packages
        run: |
          pnpm --filter @irongolem/design-tokens build 2>/dev/null || true
          pnpm --filter @irongolem/schema build 2>/dev/null || true
          pnpm --filter @irongolem/ui build 2>/dev/null || true
          pnpm --filter @irongolem/web build 2>/dev/null || true
        env:
          NODE_ENV: production

      - name: Package web dist
        run: |
          if [ -d "apps/web/dist" ]; then
            tar -czf irongolem-web-dist.tar.gz -C apps/web/dist .
          else
            echo "Web dist not found, creating placeholder"
            mkdir -p apps/web/dist
            echo "<html><body>IronGolem OS</body></html>" > apps/web/dist/index.html
            tar -czf irongolem-web-dist.tar.gz -C apps/web/dist .
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: irongolem-web-dist.tar.gz
          retention-days: 5

  create-release:
    name: Create GitHub Release
    needs: [build-go-binaries, build-rust-libs, build-web]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release

          # Flatten Go binaries from each platform directory
          for dir in artifacts/go-*/; do
            cp "${dir}"* release/ 2>/dev/null || true
          done

          # Copy Rust library tarballs
          for dir in artifacts/rust-*/; do
            cp "${dir}"*.tar.gz release/ 2>/dev/null || true
          done

          # Copy web dist
          cp artifacts/web-dist/*.tar.gz release/ 2>/dev/null || true

          echo "=== Release assets ==="
          ls -la release/

      - name: Generate checksums
        working-directory: release
        run: |
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate release notes
        run: |
          VERSION="${{ github.ref_name }}"
          cat > release-notes.md << 'HEADER'
          ## IronGolem OS ${{ github.ref_name }}

          A self-hosted autonomous assistant platform with self-healing, self-learning,
          auto-research, self-defending, and self-improving capabilities.

          ### Go Service Binaries

          Pre-compiled, statically-linked binaries for all 8 services:
          `gateway`, `scheduler`, `health`, `defense`, `research`, `optimizer`, `tenancy`, `fleet`

          Available for: Linux (amd64, arm64), macOS (amd64, arm64), Windows (amd64)

          ### Rust Runtime Libraries

          Pre-compiled libraries for the trusted execution runtime:
          `irongolem-core`, `irongolem-workflow`, `irongolem-sandbox`, `irongolem-verifier`,
          `irongolem-checkpoints`, `irongolem-memory`

          ### Web Frontend

          Pre-built React web application (`irongolem-web-dist.tar.gz`).

          ### Installation

          ```bash
          # Download and extract Go binaries
          curl -LO https://github.com/Ph4wkm00n/IronGolem_OS/releases/download/${{ github.ref_name }}/irongolem-gateway-linux-amd64
          chmod +x irongolem-gateway-linux-amd64
          ./irongolem-gateway-linux-amd64

          # Or use Docker
          docker compose -f infra/docker/docker-compose.yml up -d
          ```

          See the [Deployment Guide](https://github.com/Ph4wkm00n/IronGolem_OS/blob/main/docs/guides/deployment-guide.md) for full instructions.

          HEADER

          # Add changelog
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "### Changes since ${PREV_TAG}" >> release-notes.md
            echo "" >> release-notes.md
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" >> release-notes.md
          else
            echo "### Commits in this release" >> release-notes.md
            echo "" >> release-notes.md
            git log --pretty=format:"- %s" -20 >> release-notes.md
          fi

          echo "" >> release-notes.md
          echo "" >> release-notes.md
          echo "### Checksums (SHA256)" >> release-notes.md
          echo '```' >> release-notes.md
          cat release/SHA256SUMS.txt >> release-notes.md
          echo '```' >> release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.md
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
