name: Bug Report
description: Report a bug in IronGolem OS
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the form below to help us investigate and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe what went wrong...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
      placeholder: Describe what should have happened...
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages, logs, or screenshots if available.
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - Critical - System is unusable or data loss occurs
        - High - Major feature is broken with no workaround
        - Medium - Feature is broken but a workaround exists
        - Low - Minor issue or cosmetic problem
    validations:
      required: true

  - type: dropdown
    id: deployment-mode
    attributes:
      label: Deployment Mode
      description: Which deployment mode are you using?
      options:
        - Solo (SQLite)
        - Household (Shared SQLite)
        - Team (PostgreSQL)
        - Unknown
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: IronGolem OS Version
      description: Which version of IronGolem OS are you running?
      placeholder: e.g., v0.5.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: What OS are you running on?
      placeholder: e.g., Ubuntu 22.04, macOS 14.2, Windows 11

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots about the issue.
      placeholder: Add any other context here...
