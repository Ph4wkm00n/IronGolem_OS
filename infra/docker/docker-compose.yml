version: "3.9"

services:
  gateway:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.services
    command: ["irongolem-gateway"]
    ports:
      - "8080:8080"
    environment:
      - IRONGOLEM_MODE=solo
      - IRONGOLEM_DB_PATH=/data/irongolem.db
      - IRONGOLEM_LOG_LEVEL=info
      - DEPLOYMENT_MODE=solo
    volumes:
      - irongolem-data:/data

  scheduler:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.services
    command: ["irongolem-scheduler"]
    ports:
      - "8081:8081"
    environment:
      - IRONGOLEM_MODE=solo
      - IRONGOLEM_LOG_LEVEL=info

  health:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.services
    command: ["irongolem-health"]
    ports:
      - "8082:8082"
    environment:
      - IRONGOLEM_LOG_LEVEL=info

  defense:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.services
    command: ["irongolem-defense"]
    ports:
      - "8083:8083"
    environment:
      - IRONGOLEM_LOG_LEVEL=info

  research:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.services
    command: ["irongolem-research"]
    ports:
      - "8085:8085"
    environment:
      - IRONGOLEM_LOG_LEVEL=info

  optimizer:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.services
    command: ["irongolem-optimizer"]
    ports:
      - "8086:8086"
    environment:
      - IRONGOLEM_LOG_LEVEL=info

  tenancy:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.services
    command: ["irongolem-tenancy"]
    ports:
      - "8084:8084"
    environment:
      - IRONGOLEM_MODE=solo
      - IRONGOLEM_LOG_LEVEL=info

  fleet:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.services
    command: ["irongolem-fleet"]
    ports:
      - "8087:8087"
    environment:
      - IRONGOLEM_LOG_LEVEL=info

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    ports:
      - "3000:3000"
    depends_on:
      - gateway

volumes:
  irongolem-data:
